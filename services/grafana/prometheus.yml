global:
  scrape_interval: 5s
  external_labels:
    monitor: 'questdb'

scrape_configs:
  - job_name: 'questdb'
    scrape_interval: 5s
    static_configs:
      - targets: ['127.0.0.1:9003']

  - job_name: 'chronicle streams metrics'
    scrape_interval: 15s
    static_configs:
      - targets: [ '172.31.15.123:1234' ]

  - job_name: '1p_connect instance metrics'
    scrape_interval: 15s
    static_configs:
      - targets: [ '172.31.13.68:9100' ]

  - job_name: 'dashboard instance metrics'
    scrape_interval: 15s
    static_configs:
      - targets: [ '172.31.44.225:9100' ]

  - job_name: 'datapipe instance metrics'
    scrape_interval: 15s
    static_configs:
      - targets: [ '172.31.18.181:9100' ]

  - job_name: 'sentry instance metrics'
    scrape_interval: 15s
    static_configs:
      - targets: [ '172.31.0.13:9100' ]

  - job_name: 'datapipe-engine-streams instance metrics'
    scrape_interval: 15s
    static_configs:
      - targets: [ '172.31.29.115:9100' ]

  - job_name: 'instruments-api instance metrics'
    scrape_interval: 15s
    static_configs:
      - targets: [ '172.31.4.84:9100' ]

  - job_name: 'datastore instance metrics'
    scrape_interval: 15s
